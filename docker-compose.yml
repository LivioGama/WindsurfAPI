services:
  windsurf-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      PORT: 3003
      DATA_DIR: /data
      LS_BINARY_PATH: /app/language_server_linux_x64
      REPLICA_ISOLATE: 1
    expose:
      - "3003"
    volumes:
      - windsurf-data:/data
      - windsurf-opt:/opt/windsurf
      - windsurf-tmp:/tmp/windsurf-workspace
    deploy:
      replicas: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

volumes:
  windsurf-data:
  windsurf-opt:
  windsurf-tmp:
