services:
  windsurf-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      PORT: 3003
      DATA_DIR: /data
      LS_BINARY_PATH: /opt/windsurf/language_server_linux_x64
      REPLICA_ISOLATE: 1
    expose:
      - "3003"
    volumes:
      - ./.docker-data/data:/data
      - ./.docker-data/opt/windsurf:/opt/windsurf
      - ./.docker-data/tmp/windsurf-workspace:/tmp/windsurf-workspace
    deploy:
      replicas: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.windsurf.rule=Host(`windsurf.liviogama.com`)
      - traefik.http.routers.windsurf.entrypoints=web,websecure
      - traefik.http.routers.windsurf.middlewares=redirect-to-https@file
      - traefik.http.routers.windsurf.tls.certresolver=letsencrypt
      - traefik.http.services.windsurf.loadbalancer.server.port=3003
